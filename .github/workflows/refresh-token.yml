name: Token Yenile

# Uzun ömürlü Instagram token'ı 60 günde bir yenilenmeli. Haftalık çalışıp
# yeni token'ı IG_ACCESS_TOKEN secret'ına geri yazar (böylece hiç süresi dolmaz).
#
# ÖN KOŞUL: repo secret'ı olarak GH_PAT tanımla — secrets:write izinli bir
# fine-grained PAT. Varsayılan GITHUB_TOKEN secret güncelleyemez.
on:
  schedule:
    - cron: "0 12 * * 1"   # her Pazartesi 12:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: requests kur
        run: pip install requests python-dotenv PyYAML

      - name: Token'ı yenile
        id: refresh
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_MODE: ${{ vars.GRAPH_MODE }}
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
        run: python scripts/refresh_token.py

      - name: Yeni token'ı secret olarak sakla
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_TOKEN: ${{ steps.refresh.outputs.new_token }}
        run: gh secret set IG_ACCESS_TOKEN --body "$NEW_TOKEN" --repo "$GITHUB_REPOSITORY"
