# ============================================================================
#  İÇERİK SÜTUNLARI  —  Her gönderi bunlardan birine ait.
#  rotation sırayla döner (state.py son kullanılanı hatırlar, sıradakini seçer).
#  Her sütunun "yon" alanı, ideation prompt'una fikir üretmesi için verilir.
# ============================================================================

rotation: ["A", "B", "C", "D", "E"]

pillars:
  A:
    ad: "Alternatif Tarih"
    aciklama: "Tarihsel bir an, hiç olmamış bir teknolojiyle yeniden kurgulanır."
    ornek: "1920'ler İstanbul'unda neon hologram tramvaylar, buhar ve devre karışımı sokaklar."
    yon: >-
      Belirli bir tarihsel dönem ve şehir seç (ör. Osmanlı, Victoria dönemi Londra,
      1950'ler Tokyo). Ona anakronik ileri teknoloji yerleştir: hologram, neon,
      androidler, uçan araçlar. Dönemin mimarisi ve kıyafeti korunur ama teknoloji
      geleceğe aittir. Dönem-teknoloji zıtlığı çarpıcı olsun.

  B:
    ad: "Yakın Gelecek Sokakları"
    aciklama: "2050-2090 arası şehir sahneleri; yağmur, neon, kalabalık."
    ornek: "2071 Jakarta'sında, yağmur altında neon tabelalı dar bir çarşı, izometrik kadraj."
    yon: >-
      2050-2090 arası bir tarih ve gerçek bir megakent seç. Sokak seviyesi ya da
      izometrik kadraj. Yağmur, buhar, kalabalık, holografik reklamlar, çok katmanlı
      şehir. Yaşayan, nefes alan bir an yakala — bir kişi, bir dükkan, bir köşe.

  C:
    ad: "Terkedilmiş Gelecek"
    aciklama: "Çökmüş yüksek teknoloji, doğaya karışan megayapılar."
    ornek: "Ormanın yuttuğu dev bir veri merkezi, kırık güneş panelleri, sessizlik."
    yon: >-
      İnsanlığın terk ettiği bir ileri-teknoloji yapı seç: veri merkezi, uzay limanı,
      megablok, robot fabrikası. Doğa onu geri alıyor — sarmaşık, su, kum, pas.
      Melankolik, sakin, post-apokaliptik ama şiirsel. İnsan yok ya da tek bir figür.

  D:
    ad: "Portre"
    aciklama: "Siberpunk karakter portreleri; implant/protez detaylı, sinematik ışık."
    ornek: "Kromajlı gözlü, devre dövmeli bir sokak hackeri, yandan neon ışık."
    yon: >-
      Tek bir siberpunk karakter tasarla: meslek/arketip belirle (hacker, samuray,
      tamirci, elçi). Kibernetik detaylar (implant, protez kol, göz, devre dövmesi).
      Yakın/orta plan portre, sinematik yan ışık, karakterin bir hikayesi hissedilsin.

  E:
    ad: "Nesne / Artefakt"
    aciklama: "Kurgusal bir cihazın müze/katalog sunumu."
    ornek: "2140 yapımı bir nöral arayüz maskesi, koyu zeminde müze vitrini sunumu."
    yon: >-
      Kurgusal tek bir cihaz/artefakt tasarla: nöral arayüz, silah, iletişim aracı,
      implant. Onu bir müze vitrini ya da ürün-katalog sunumu gibi göster: temiz zemin,
      tek ışık, detaylı doku. Nesnenin ne işe yaradığı merak uyandırsın.
