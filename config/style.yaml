# ============================================================================
#  GÖRSEL KİMLİK — kulups.com (Kulüp Yönetimi)
#  Akış: AI arka plan görseli → koyu degrade örtü → ÜZERİNE Pillow ile GERÇEK
#  metin (başlık + fayda) + logo. AI modelleri yazı basamadığı için metni biz
#  basıyoruz; bu yüzden negatif prompt'ta "text/letters" kesinlikle yasak.
# ============================================================================
aspect_ratio: "4:5"
width: 1080
height: 1350

# Arka plan görselinin ortak stili — her görsel prompt'unun SONUNA eklenir.
style_suffix: >-
  professional sports photography, modern basketball gym or club environment,
  clean and uncluttered composition, generous empty negative space in the lower
  half for text overlay, natural window light with warm highlights, cinematic
  color grade, sharp focus and crisp detail throughout with only a gently
  softened far background, bright and airy, optimistic and trustworthy mood,
  editorial commercial photography quality, high resolution

# Yüz/el bozukluğu ve yazı riskini bastırır (metni biz basıyoruz).
negative_prompt: >-
  text, letters, words, numbers, watermark, signature, logo, brand marks,
  captions, subtitles, ui, interface, close-up face, distorted face, deformed
  hands, extra fingers, extra limbs, mutated anatomy, low quality, blurry,
  jpeg artifacts, oversaturated, cartoon, anime, 3d render, cluttered, messy,
  dark and gloomy, sad mood

palette:
  navy: "#0f172a"      # logo laciverti / metin zemini
  blue: "#1a56db"      # sitenin birincil rengi (vurgu)
  gold: "#d4a94f"      # logodaki altın (aksan çizgisi)
  white: "#ffffff"

# --- Görsel son-işleme (hafif; kart okunabilirliği önce gelir) ---
post:
  contrast: 1.04
  saturation: 1.02
  grain: 0.0
  vignette: 0.12

# --- METİN KARTI: arka planın üstüne basılan gerçek metin katmanı ---
card:
  enabled: true
  # Alt yarıyı karartan degrade → beyaz metin her arka planda okunur
  overlay:
    color: "#0b1220"
    top_alpha: 0.10        # üst kenarda örtü neredeyse yok
    bottom_alpha: 0.92     # altta güçlü (metin bölgesi)
    start: 0.30            # görselin %30'undan itibaren koyulaşmaya başla
  margin: 78               # kenar boşluğu (px)
  headline:
    size: 74               # büyük başlık (özellik/fayda)
    line_spacing: 12
    max_lines: 3
    color: "#ffffff"
  benefit:
    size: 38               # altındaki açıklama satırı
    line_spacing: 9
    max_lines: 3
    color: "#dbe3f0"
    gap: 26                # başlıkla arasındaki boşluk
  accent:                  # başlığın üstündeki kısa altın çizgi
    color: "#d4a94f"
    width: 96
    height: 7
    gap: 26
  logo:
    path: "assets/logo.png"
    height: 92             # sol üst köşe
    opacity: 0.97
  footer:
    text: "kulups.com"
    size: 30
    color: "#c8d3e6"
    opacity: 0.92
